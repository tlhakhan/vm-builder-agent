name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: build release binaries
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            -o vm-builder-agent-${{ matrix.suffix }} \
            .

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vm-builder-agent-${{ matrix.suffix }}
          path: vm-builder-agent-${{ matrix.suffix }}

  release:
    name: create github release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            vm-builder-agent-linux-amd64
            vm-builder-agent-linux-arm64
